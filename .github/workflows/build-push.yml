name: Build and push multi-arch image from Nix flake

on:
  workflow_call:
    inputs:
      image:
        description: "Destination image, e.g. ghcr.io/org/name"
        required: true
        type: string
      flake-attr:
        description: "Nix flake attribute producing a dockerTools image"
        required: false
        type: string
        default: ".#docker"

jobs:
  amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        run: |
          nix build "${{ inputs.flake-attr }}"
          docker load < result
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image-amd64
          path: result

  arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        run: |
          nix build "${{ inputs.flake-attr }}"
          docker load < result
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image-arm64
          path: result

  push:
    needs: [amd64, arm64]
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v5
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push multi-arch manifest
        env:
          IMAGE: ${{ inputs.image }}
        run: |
          TAG_PREFIX=${GITHUB_REF#refs/*/}-${{ github.run_id }}
          ARCHS=(amd64 arm64)
          LOCAL_IMAGES=()

          for arch in "${ARCHS[@]}"; do
            CONTAINER_WITH_TAG=$(docker load < docker-image-$arch/result | tail -n1 | rev | cut -d' ' -f1 | rev)
            CONTAINER=$(echo "$CONTAINER_WITH_TAG" | cut -d: -f1)

            LOCAL_IMAGE="localhost:5000/$CONTAINER:${TAG_PREFIX}-$arch"
            docker tag "$CONTAINER_WITH_TAG" "$LOCAL_IMAGE"
            docker push "$LOCAL_IMAGE"

            LOCAL_IMAGES+=("$LOCAL_IMAGE")
          done

          docker buildx imagetools create \
            -t "$IMAGE:latest" \
            -t "$IMAGE:${TAG_PREFIX}" \
            "${LOCAL_IMAGES[@]}"
